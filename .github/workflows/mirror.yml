name: Mirror to Codeberg

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Codeberg
        run: |
          git remote add codeberg \
            "https://phishdestroy:${{ secrets.CODEBERG_TOKEN }}@codeberg.org/phishdestroy/shortdot-evidence.git"
          git push codeberg HEAD:main --force
