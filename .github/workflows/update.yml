name: Daily Zone Update

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch zone data & update stats
        env:
          NETAPI_TOKEN: ${{ secrets.NETAPI_TOKEN }}
          TLD_LIST: icu,bond,cyou,sbs,cfd,buzz,qpon
        run: python scan/fetch_new.py

      - name: Classify brand patterns
        run: python scan/classify_brands.py

      - name: Rebuild IOC flat files
        run: |
          python - <<'EOF'
          import csv
          rows = list(csv.DictReader(open('ioc/indicators.csv', encoding='utf-8-sig', errors='replace')))
          all_doms = sorted(set(r['domain'] for r in rows if r.get('domain')))
          open('ioc/domains_all_malicious.txt','w').write('\n'.join(all_doms)+'\n')
          high = sorted(set(r['domain'] for r in rows if r.get('severity','').upper()=='HIGH' and r.get('domain')))
          open('ioc/domains_high.txt','w').write('\n'.join(high)+'\n')
          print(f'all={len(all_doms)} high={len(high)}')
          EOF

      - name: Rebuild site data
        run: |
          python docs/build_datajson.py \
            --index data/index.json \
            --ioc ioc/indicators.csv \
            --legit case/LEGITIMATE_SURVEY.md \
            --out docs/data.json

      - name: Commit & push changes
        run: |
          git config user.name 'phishdestroy-bot'
          git config user.email 'bot@phishdestroy.io'
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: daily zone update $(date -u +%Y-%m-%d)"
            git push
          fi
