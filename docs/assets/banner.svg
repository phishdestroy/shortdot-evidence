<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
<defs>
  <style>
    .mono { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
    @keyframes scanline { 0%{transform:translateY(-10px);opacity:0} 5%{opacity:0.4} 95%{opacity:0.4} 100%{transform:translateY(310px);opacity:0} }
    @keyframes pulse-red { 0%,100%{r:7;opacity:1} 50%{r:10;opacity:0.5} }
    @keyframes glow-in { from{opacity:0;filter:blur(4px)} to{opacity:1;filter:blur(0)} }

    @keyframes tld1 { 0%,12%{opacity:1} 14%,100%{opacity:0} }
    @keyframes tld2 { 0%,12%{opacity:0} 14%,26%{opacity:1} 28%,100%{opacity:0} }
    @keyframes tld3 { 0%,26%{opacity:0} 28%,40%{opacity:1} 42%,100%{opacity:0} }
    @keyframes tld4 { 0%,40%{opacity:0} 42%,54%{opacity:1} 56%,100%{opacity:0} }
    @keyframes tld5 { 0%,54%{opacity:0} 56%,68%{opacity:1} 70%,100%{opacity:0} }
    @keyframes tld6 { 0%,68%{opacity:0} 70%,82%{opacity:1} 84%,100%{opacity:0} }
    @keyframes tld7 { 0%,82%{opacity:0} 84%,98%{opacity:1} 100%{opacity:0} }

    @keyframes bar-grow { from{width:0} to{width:var(--w)} }
    @keyframes fade-up { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  </style>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0c1018"/>
    <stop offset="100%" stop-color="#0d1117"/>
  </linearGradient>
  <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#da3633" stop-opacity="0"/>
    <stop offset="50%" stop-color="#da3633" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#da3633" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#30363d" stop-opacity="0"/>
    <stop offset="20%" stop-color="#30363d" stop-opacity="1"/>
    <stop offset="80%" stop-color="#30363d" stop-opacity="1"/>
    <stop offset="100%" stop-color="#30363d" stop-opacity="0"/>
  </linearGradient>
  <filter id="glow-red">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-blue">
    <feGaussianBlur stdDeviation="2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <clipPath id="main-clip">
    <rect width="1200" height="300"/>
  </clipPath>
</defs>

<!-- Background -->
<rect width="1200" height="300" fill="url(#bg)"/>

<!-- Subtle grid -->
<g opacity="0.3">
  <line x1="0" y1="60" x2="1200" y2="60" stroke="#1a2030" stroke-width="0.5"/>
  <line x1="0" y1="120" x2="1200" y2="120" stroke="#1a2030" stroke-width="0.5"/>
  <line x1="0" y1="180" x2="1200" y2="180" stroke="#1a2030" stroke-width="0.5"/>
  <line x1="0" y1="240" x2="1200" y2="240" stroke="#1a2030" stroke-width="0.5"/>
  <line x1="200" y1="0" x2="200" y2="300" stroke="#1a2030" stroke-width="0.5"/>
  <line x1="400" y1="0" x2="400" y2="300" stroke="#1a2030" stroke-width="0.5"/>
  <line x1="600" y1="0" x2="600" y2="300" stroke="#1a2030" stroke-width="0.5"/>
  <line x1="800" y1="0" x2="800" y2="300" stroke="#1a2030" stroke-width="0.5"/>
  <line x1="1000" y1="0" x2="1000" y2="300" stroke="#1a2030" stroke-width="0.5"/>
</g>

<!-- Scanline animation -->
<g clip-path="url(#main-clip)">
  <rect x="0" y="0" width="1200" height="2" fill="#6ea8d7" opacity="0.4" style="animation: scanline 5s linear infinite;"/>
</g>

<!-- Red alert glow strips (top and bottom) -->
<rect x="0" y="0" width="1200" height="4" fill="url(#redGrad)"/>
<rect x="0" y="296" width="1200" height="4" fill="url(#redGrad)"/>

<!-- Left warning indicator -->
<circle cx="44" cy="62" r="7" fill="#da3633" filter="url(#glow-red)" style="animation: blink 1.2s ease-in-out infinite;"/>
<circle cx="44" cy="62" r="3" fill="#ff6b6b"/>

<!-- Right warning indicator -->
<circle cx="1156" cy="62" r="7" fill="#da3633" filter="url(#glow-red)" style="animation: blink 1.2s ease-in-out infinite 0.6s;"/>
<circle cx="1156" cy="62" r="3" fill="#ff6b6b"/>

<!-- ══ HEADER ══ -->
<text x="600" y="50" class="mono" font-size="11" fill="#8b949e" text-anchor="middle" letter-spacing="6" style="animation: fade-up 0.8s ease both;">PHISHDESTROY INVESTIGATION · TLP:CLEAR · PHASE II</text>

<text x="600" y="92" class="mono" font-size="32" font-weight="bold" fill="#c9d1d9" text-anchor="middle" letter-spacing="2" filter="url(#glow-blue)" style="animation: fade-up 0.8s ease 0.2s both;">ShortDot SA — Zone Evidence</text>

<!-- Separator line -->
<rect x="0" y="110" width="1200" height="1" fill="url(#lineGrad)"/>

<!-- ══ TLD CYCLING ZONE ══ -->
<!-- "Under investigation:" label -->
<text x="60" y="160" class="mono" font-size="11" fill="#8b949e" letter-spacing="1">ZONES UNDER INVESTIGATION</text>

<!-- Animated TLD display - centered -->
<g transform="translate(600,168)">
  <!-- Each TLD fades in/out on a 14s cycle -->
  <text text-anchor="middle" class="mono" font-size="52" font-weight="bold" fill="#da3633" letter-spacing="4" filter="url(#glow-red)" opacity="0" style="animation: tld1 14s ease-in-out infinite;">.icu</text>
  <text text-anchor="middle" class="mono" font-size="52" font-weight="bold" fill="#e3b341" letter-spacing="4" opacity="0" style="animation: tld2 14s ease-in-out infinite;">.bond</text>
  <text text-anchor="middle" class="mono" font-size="52" font-weight="bold" fill="#da3633" letter-spacing="4" filter="url(#glow-red)" opacity="0" style="animation: tld3 14s ease-in-out infinite;">.cyou</text>
  <text text-anchor="middle" class="mono" font-size="52" font-weight="bold" fill="#e3b341" letter-spacing="4" opacity="0" style="animation: tld4 14s ease-in-out infinite;">.sbs</text>
  <text text-anchor="middle" class="mono" font-size="52" font-weight="bold" fill="#da3633" letter-spacing="4" filter="url(#glow-red)" opacity="0" style="animation: tld5 14s ease-in-out infinite;">.cfd</text>
  <text text-anchor="middle" class="mono" font-size="52" font-weight="bold" fill="#e3b341" letter-spacing="4" opacity="0" style="animation: tld6 14s ease-in-out infinite;">.buzz</text>
  <text text-anchor="middle" class="mono" font-size="52" font-weight="bold" fill="#da3633" letter-spacing="4" filter="url(#glow-red)" opacity="0" style="animation: tld7 14s ease-in-out infinite;">.qpon</text>
</g>

<!-- ══ RIGHT PANEL — Stats ══ -->
<text x="1140" y="137" class="mono" font-size="10" fill="#8b949e" text-anchor="end" letter-spacing="1">ABUSE RATE</text>
<text x="1140" y="158" class="mono" font-size="36" font-weight="bold" fill="#da3633" text-anchor="end" filter="url(#glow-red)">~86%</text>
<text x="1140" y="175" class="mono" font-size="10" fill="#8b949e" text-anchor="end">of active domains</text>

<text x="1140" y="205" class="mono" font-size="10" fill="#8b949e" text-anchor="end" letter-spacing="1">LEGIT USE</text>
<text x="1140" y="226" class="mono" font-size="36" font-weight="bold" fill="#3fb950" text-anchor="end">SHOW US</text>
<text x="1140" y="243" class="mono" font-size="10" fill="#8b949e" text-anchor="end">name one real business</text>

<!-- ══ LEFT PANEL — Entity ══ -->
<text x="60" y="137" class="mono" font-size="10" fill="#8b949e" letter-spacing="1">REGISTRY OPERATOR</text>
<text x="60" y="162" class="mono" font-size="20" font-weight="bold" fill="#6ea8d7">ShortDot SA</text>
<text x="60" y="180" class="mono" font-size="11" fill="#8b949e">9 Rue Louvigny, Luxembourg</text>
<text x="60" y="198" class="mono" font-size="11" fill="#8b949e">7 TLD zones · CentralNic backend</text>
<text x="60" y="218" class="mono" font-size="10" fill="#8b949e" letter-spacing="1">PARTNERS</text>
<text x="60" y="235" class="mono" font-size="11" fill="#c9d1d9">NameSilo · GoDaddy · Namecheap</text>
<text x="60" y="252" class="mono" font-size="11" fill="#c9d1d9">Alibaba · GMO · Dynadot + 400+</text>

<!-- ══ Separator line 2 ══ -->
<rect x="0" y="268" width="1200" height="1" fill="url(#lineGrad)"/>

<!-- ══ FOOTER ══ -->
<text x="600" y="288" class="mono" font-size="11" fill="#6e7681" text-anchor="middle" letter-spacing="3">phishdestroy.io · Auto-updated daily · MIT · TLP:CLEAR</text>

<!-- Left accent line -->
<rect x="0" y="110" width="3" height="159" fill="#da3633" opacity="0.6"/>
<!-- Right accent line -->
<rect x="1197" y="110" width="3" height="159" fill="#da3633" opacity="0.6"/>
</svg>
