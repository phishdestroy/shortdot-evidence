<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
<defs>
  <style>.mono{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace}</style>
  <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
    <stop offset="0%" stop-color="#070b12"/>
    <stop offset="100%" stop-color="#0d1117"/>
  </linearGradient>
  <linearGradient id="rg" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#da3633" stop-opacity="0"/>
    <stop offset="30%" stop-color="#da3633" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#da3633" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="vg" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0"/>
    <stop offset="60%" stop-color="#8b5cf6" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
  </linearGradient>
  <filter id="gr">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="gb">
    <feGaussianBlur stdDeviation="2.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- BG -->
<rect width="1200" height="630" fill="url(#bg)"/>

